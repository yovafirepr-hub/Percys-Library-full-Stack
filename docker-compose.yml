version: "3.9"

# Spin up a Postgres just for local dev. Mirrors the connection
# string used in apps/server/.env.example so `npm run dev` works
# out of the box once you `docker compose up -d`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: percys-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: percys
    ports:
      - "5432:5432"
    volumes:
      - percys-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d percys"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  percys-pg-data:
